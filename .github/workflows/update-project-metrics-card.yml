name: Update Project Metrics Card

on:
  schedule:
    - cron: "30 2 * * *" # daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cloc
        run: |
          sudo apt-get update
          sudo apt-get install -y cloc

      - name: Generate card
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/generate_project_metrics_card.py \
            --username Jacobinwwey \
            --days 30 \
            --exclude-update-repo Jacobinwwey \
            --output-svg assets/project-metrics-top-repos-card.svg \
            --output-json assets/project-metrics-data.json

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- assets/project-metrics-top-repos-card.svg assets/project-metrics-data.json; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/project-metrics-top-repos-card.svg assets/project-metrics-data.json
          git commit -m "chore: refresh project metrics card"
          git push
