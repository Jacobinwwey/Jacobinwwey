  <text x="1152" y="285" text-anchor="end" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">103 commits | 178,195 changed</text>

  <text x="632" y="324" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">2. astrbot_plugin_sharelife</text>
  <rect x="826" y="306" width="326" height="20" rx="10" fill="#dbeafe"/>
