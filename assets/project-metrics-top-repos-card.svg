<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Project Metrics Card</title>
  <desc id="desc">Left column shows fair code metrics, right column shows 30-day activity metrics excluding profile README repository.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#eef2ff" />
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="1184" height="504" rx="20" fill="url(#bg2)" stroke="#c7d8f8" stroke-width="2"/>
  <rect x="8" y="8" width="1184" height="14" rx="20" fill="url(#bar)"/>

  <text x="36" y="50" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">
    Project Metrics (Non-fork Repositories)
  </text>
  <text x="36" y="74" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">
