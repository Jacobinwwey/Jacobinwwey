<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Repository Activity Window - 30 Days</title>
  <desc id="desc">Non-fork repository 30-day activity excluding profile repository updates: commit count and code changes comparison</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#eef2ff" />
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="1184" height="404" rx="20" fill="url(#bg2)" stroke="#c7d8f8" stroke-width="2"/>
  <text x="36" y="50" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">
    Activity Window (30 days) - Non-fork Repositories
  </text>
  <text x="36" y="74" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    Snapshot: 2026-03-30 UTC | Excluding profile repo (Jacobinwwey) updates
  </text>

  <rect x="30" y="92" width="360" height="78" rx="14" fill="#ffffff" stroke="#dbe7fb"/>
  <text x="50" y="122" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="14">Updated Repositories (30d)</text>
  <text x="50" y="152" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">4</text>

  <rect x="420" y="92" width="360" height="78" rx="14" fill="#ffffff" stroke="#dbe7fb"/>
  <text x="440" y="122" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="14">Total Commits (30d)</text>
  <text x="440" y="152" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">212</text>

  <rect x="810" y="92" width="360" height="78" rx="14" fill="#ffffff" stroke="#dbe7fb"/>
  <text x="830" y="122" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="14">Total Changed Lines (30d)</text>
  <text x="830" y="152" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">227,092</text>

  <text x="40" y="212" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">1. NoteConnection</text>
  <rect x="320" y="192" width="760" height="24" rx="12" fill="#dbeafe"/>
  <rect x="320" y="192" width="760" height="24" rx="12" fill="url(#bar)"/>
  <text x="1098" y="209" text-anchor="end" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">103 commits | 178,195 changed</text>

  <text x="40" y="260" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">2. astrbot_plugin_sharelife</text>
  <rect x="320" y="240" width="760" height="24" rx="12" fill="#dbeafe"/>
  <rect x="320" y="240" width="101" height="24" rx="12" fill="url(#bar)"/>
  <text x="1098" y="257" text-anchor="end" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">58 commits | 23,585 changed</text>

  <text x="40" y="308" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">3. obsidian-NotEMD</text>
  <rect x="320" y="288" width="760" height="24" rx="12" fill="#dbeafe"/>
  <rect x="320" y="288" width="55" height="24" rx="12" fill="url(#bar)"/>
  <text x="1098" y="305" text-anchor="end" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">29 commits | 12,969 changed</text>

  <text x="40" y="356" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">4. astrbot_plugin_onesync</text>
  <rect x="320" y="336" width="760" height="24" rx="12" fill="#dbeafe"/>
  <rect x="320" y="336" width="52" height="24" rx="12" fill="url(#bar)"/>
  <text x="1098" y="353" text-anchor="end" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">22 commits | 12,343 changed</text>

  <text x="40" y="394" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="14">
    Bar scale: changed lines relative to the most changed repository in the last 30 days
  </text>
</svg>
