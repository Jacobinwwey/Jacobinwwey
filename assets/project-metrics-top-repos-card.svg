  <text x="1152" y="399" text-anchor="end" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">22 commits | 12,343 changed</text>

  <text x="632" y="440" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="13">
