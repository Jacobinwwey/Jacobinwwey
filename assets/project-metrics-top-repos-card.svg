  </text>

  <rect x="30" y="96" width="560" height="394" rx="16" fill="#ffffff" stroke="#dbe7fb"/>
  <rect x="610" y="96" width="560" height="394" rx="16" fill="#ffffff" stroke="#dbe7fb"/>

  <text x="52" y="132" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    Fair Code Metrics
  </text>
  <text x="52" y="156" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="14">
