  </text>

  <rect x="52" y="176" width="246" height="92" rx="14" fill="#f8fbff" stroke="#dbe7fb"/>
  <text x="70" y="207" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="14">Fair LOC</text>
  <text x="70" y="244" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">159,434</text>

  <rect x="318" y="176" width="246" height="92" rx="14" fill="#f8fbff" stroke="#dbe7fb"/>
  <text x="336" y="207" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="14">Raw LOC</text>
  <text x="336" y="244" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">1,683,627</text>

  <rect x="52" y="286" width="512" height="92" rx="14" fill="#f8fbff" stroke="#dbe7fb"/>
  <text x="70" y="317" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="14">Removed by fair rules</text>
  <text x="70" y="354" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">1,524,193</text>

  <text x="52" y="406" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="14">
    Fair rules: exclude dependency/build dirs (node_modules, dist, build, target, etc.)
  </text>
  <text x="52" y="430" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="14">
    and generated files (lockfiles, *.map, *.min.js, *.min.css)
  </text>

