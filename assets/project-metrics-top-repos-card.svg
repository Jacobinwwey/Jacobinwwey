  <text x="1152" y="323" text-anchor="end" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">58 commits | 23,585 changed</text>

  <text x="632" y="362" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">3. obsidian-NotEMD</text>
  <rect x="826" y="344" width="326" height="20" rx="10" fill="#dbeafe"/>
  <rect x="826" y="344" width="24" height="20" rx="10" fill="url(#bar)"/>
  <text x="1152" y="361" text-anchor="end" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">29 commits | 12,969 changed</text>

  <text x="632" y="400" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">4. astrbot_plugin_onesync</text>
  <rect x="826" y="382" width="326" height="20" rx="10" fill="#dbeafe"/>
